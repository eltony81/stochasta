name: stochasta
version: 0.2.0
description: A fast, lightweight, and dependency-free library for stochastic simulations, metaheuristic global optimization (Genetic Algorithms, PSO, Differential Evolution, ABC, ACO, Simulated Annealing), Bayesian analysis, and unsupervised learning clustering/dimensionality reduction (K-Means, DBSCAN, K-Medoids, Mean Shift, PCA, Hierarchical clustering, Apriori) in pure Crystal.

authors:
  - tony <antonio.difluri@gmail.com>

crystal: '>= 1.20.2'

license: MIT

repository: https://github.com/eltony81/stochasta
homepage: https://github.com/eltony81/stochasta
